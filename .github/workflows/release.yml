name: Release

on:
  push:
    paths:
      - '.github/workflows/**'
      - 'appinfo/**'
      - 'composer.json'
      - 'composer.lock'
      - 'css/**'
      - 'img/**'
      - 'js/**'
      - 'l10n/**'
      - 'lib/**'
      - 'package-lock.json'
      - 'package.json'
      - 'src/**'
      - 'templates/**'

jobs:
  changelog:
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.clean_changelog }}
      skipped: ${{ steps.changelog.outputs.skipped }}
      tag: ${{ steps.changelog.outputs.tag }}
      version: ${{ steps.changelog.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.github_token }}
          output-file: "false"
          skip-commit: "true"
          skip-on-empty: "true"
          skip-version-file: "true"

  build:
    needs: changelog
    if: ${{ needs.changelog.outputs.skipped == 'false' }}
    runs-on: ubuntu-latest
    environment: release
    env:
      APP_ID: maps
      RELEASE_TAG: ${{ needs.changelog.outputs.tag }}
      RELEASE_VERSION: ${{ needs.changelog.outputs.version }}
    outputs:
      asset_name: ${{ steps.package.outputs.asset_name }}
      asset_path: ${{ steps.package.outputs.asset_path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Set up npm
        run: npm i -g npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: exif, mbstring, intl, sqlite3, gd
          ini-values: post_max_size=256M, max_execution_time=180
          coverage: none
          tools: composer, php-cs-fixer, phpunit

      - name: Tag HEAD
        run: git tag "${RELEASE_TAG}"

      - name: Build project
        id: package
        run: |
          mkdir -p ~/.nextcloud/certificates
          echo "$APP_CRT" > ~/.nextcloud/certificates/${APP_ID}.crt
          echo "$APP_KEY" > ~/.nextcloud/certificates/${APP_ID}.key

          export DEBIAN_FRONTEND=noninteractive
          sudo apt update -y
          sudo apt install make openssl -y

          mkdir -p ~/html
          git clone https://github.com/nextcloud/server.git --recursive --depth 1 -b stable33 ~/html/nextcloud
          cp -r "$GITHUB_WORKSPACE" ~/html/nextcloud/apps/${APP_ID}

          php ~/html/nextcloud/occ maintenance:install --database sqlite --admin-user admin --admin-pass password
          cd ~/html/nextcloud/apps/${APP_ID}

          webserveruser=runner occ_dir=~/html/nextcloud make > /dev/null
          php ~/html/nextcloud/occ app:enable ${APP_ID}
          php ~/html/nextcloud/occ maintenance:mode --off

          webserveruser=runner occ_dir=~/html/nextcloud version=${RELEASE_VERSION} make appstore

          echo "asset_name=${APP_ID}-${RELEASE_VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "asset_path=/tmp/build/${APP_ID}-${RELEASE_VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
        env:
          APP_CRT: ${{ secrets.APP_CRT }}
          APP_KEY: ${{ secrets.APP_KEY }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.body }}
          files: ${{ steps.package.outputs.asset_path }}
          tag_name: ${{ env.RELEASE_TAG }}
          token: ${{ github.token }}

      - name: Publish release to appstore
        run: |
          signature=$(tr -d '\n' < /tmp/build/sign.txt)
          download_url="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${APP_ID}-${RELEASE_VERSION}.tar.gz"
          curl -X POST \
            -H "Authorization: Token $APPSTORE_TOKEN" \
            -H "Content-Type: application/json" \
            https://apps.nextcloud.com/api/v1/apps/releases \
            -d "{\"download\":\"${download_url}\",\"signature\":\"${signature}\"}"
        env:
          APPSTORE_TOKEN: ${{ secrets.APPSTORE_TOKEN }}
